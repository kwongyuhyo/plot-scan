name: daily-scan

on:
  schedule:
    # UTC 22:30 = KST 07:30 — Spotify 전일 차트 확정(KST 07:00) 직후
    # 주의: Actions 스케줄은 몇 분~몇십 분 지연될 수 있음. 하루 1회 수집엔 무관.
    - cron: '30 22 * * *'
  workflow_dispatch: {}   # 수동 실행 버튼 (Actions 탭에서)

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: run scan
        run: node scan.js

      - name: commit data
        run: |
          git config user.name "plot-scan"
          git config user.email "plot-scan@users.noreply.github.com"
          git add data/ brief.md
          git diff --cached --quiet && echo "변화 없음" || git commit -m "scan: $(date -u -d '+9 hours' +%F)"
          git push
